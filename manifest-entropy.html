<!DOCTYPE html>
<!--
    MANIFEST ENTROPY: Algorithmic Art Inspired by VCR
    A meditation on declarative rendering, layered compositing, and deterministic beauty.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifest Entropy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Control Sections */
        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed Controls */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Parameter Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        /* Color Pickers */
        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .button-row .button {
            margin-bottom: 0;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            color: var(--anthropic-mid-gray);
            font-size: 18px;
            text-align: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--anthropic-light-gray);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--anthropic-mid-gray);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <h1>Manifest Entropy</h1>
            <p class="subtitle">Declarative motion driven by time expressions and layered compositing.</p>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="text" class="seed-input" id="seed-input" readonly>
                <div class="seed-controls">
                    <button class="button" onclick="previousSeed()" style="grid-column: 1;">← Prev</button>
                    <button class="button" onclick="nextSeed()" style="grid-column: 2;">Next →</button>
                </div>
                <button class="button" onclick="randomSeedAndUpdate()">Random</button>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input type="text" id="seed-jump" placeholder="Jump to seed" class="seed-input" style="margin-bottom: 0; flex: 1;">
                    <button class="button" onclick="jumpToSeed()" style="width: auto; padding: 10px 12px;">Go</button>
                </div>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>
                
                <!-- Particle Count -->
                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="5000" step="250" value="2000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">2000</span>
                    </div>
                </div>

                <!-- Layer Complexity -->
                <div class="control-group">
                    <label>Layer Complexity</label>
                    <div class="slider-container">
                        <input type="range" id="layerComplexity" min="2" max="8" step="1" value="4" oninput="updateParam('layerComplexity', this.value)">
                        <span class="value-display" id="layerComplexity-value">4</span>
                    </div>
                </div>

                <!-- Animation Speed -->
                <div class="control-group">
                    <label>Animation Speed</label>
                    <div class="slider-container">
                        <input type="range" id="animSpeed" min="0.2" max="2.0" step="0.1" value="0.8" oninput="updateParam('animSpeed', this.value)">
                        <span class="value-display" id="animSpeed-value">0.8</span>
                    </div>
                </div>

                <!-- Noise Influence -->
                <div class="control-group">
                    <label>Noise Influence</label>
                    <div class="slider-container">
                        <input type="range" id="noiseInfluence" min="0.0" max="1.0" step="0.05" value="0.4" oninput="updateParam('noiseInfluence', this.value)">
                        <span class="value-display" id="noiseInfluence-value">0.40</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>
                
                <div class="color-group">
                    <label>Primary Layer</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#d97757" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#d97757</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Secondary Layer</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#6a9bcc" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#6a9bcc</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Accent Layer</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#788c5d" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#788c5d</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button" onclick="downloadFrame()">Download</button>
                </div>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Manifest Entropy...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // MANIFEST ENTROPY - PARAMETERS
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 42,
            particleCount: 2000,
            layerComplexity: 4,
            animSpeed: 0.8,
            noiseInfluence: 0.4,
            colorPalette: ['#d97757', '#6a9bcc', '#788c5d']
        };

        let defaultParams = {...params};

        // ═══════════════════════════════════════════════════════════════════════
        // P5.JS GENERATIVE ART ALGORITHM
        // ═══════════════════════════════════════════════════════════════════════

        let particles = [];
        let layers = [];
        let time = 0;

        function setup() {
            let canvas = createCanvas(1000, 1000);
            canvas.parent('canvas-container');
            
            initializeSystem();
            
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            particles = [];
            layers = [];
            time = 0;

            // Create particles
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle(params.seed + i));
            }

            // Create layers with different characteristics
            for (let i = 0; i < params.layerComplexity; i++) {
                layers.push(new Layer(i, params.seed + 1000 + i));
            }

            background(250, 249, 245);
        }

        function draw() {
            // Fade background slightly for trailing effect
            fill(250, 249, 245, 245);
            rect(0, 0, width, height);

            time += 0.016 * params.animSpeed;

            // Draw geometric layers with time-driven expressions
            for (let layer of layers) {
                layer.update(time);
                layer.display();
            }

            // Draw particles
            for (let p of particles) {
                p.update(time);
                p.display();
            }

            // Draw compositing guides (optional, subtle)
            drawCompositeInfo();
        }

        function drawCompositeInfo() {
            fill(200);
            textFont('Courier New');
            textSize(10);
            text(`t: ${time.toFixed(2)} | seed: ${params.seed} | layers: ${params.layerComplexity}`, 10, height - 10);
        }

        // ═══════════════════════════════════════════════════════════════════════
        // PARTICLE SYSTEM
        // ═══════════════════════════════════════════════════════════════════════

        class Particle {
            constructor(seed) {
                randomSeed(seed);
                this.x = random(width);
                this.y = random(height);
                this.vx = random(-1, 1);
                this.vy = random(-1, 1);
                this.radius = random(1, 3);
                this.hue = random(360);
                this.seed = seed;
                this.age = 0;
            }

            update(t) {
                // Time-driven position with noise influence
                let noiseVal = noise(this.x / 200, this.y / 200, t * 0.2);
                let angle = noiseVal * TWO_PI * 2;
                
                this.vx = cos(angle) * 2;
                this.vy = sin(angle) * 2;

                this.x += this.vx;
                this.y += this.vy;
                this.age += 0.01;

                // Wrap around canvas
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            display() {
                let col = this.getColor();
                fill(col, 120);
                noStroke();
                circle(this.x, this.y, this.radius * 2);
            }

            getColor() {
                let hx = hexToRgb(params.colorPalette[0]);
                let hy = hexToRgb(params.colorPalette[1]);
                let hz = hexToRgb(params.colorPalette[2]);
                
                let idx = floor((this.age * params.animSpeed) % 3);
                let col = [hx, hy, hz][idx];
                return color(col.r, col.g, col.b);
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // LAYER SYSTEM - Declarative Compositing
        // ═══════════════════════════════════════════════════════════════════════

        class Layer {
            constructor(index, seed) {
                randomSeed(seed);
                this.index = index;
                this.seed = seed;
                this.x = width / 2;
                this.y = height / 2;
                this.size = 50 + index * 40;
                this.rotation = 0;
                this.type = ['circle', 'rect', 'poly'][index % 3];
                this.frequency = 0.5 + index * 0.3;
            }

            update(t) {
                // Time-driven expressions (VCR-style)
                let freq = this.frequency * params.animSpeed;
                
                // Position animation
                this.x = width / 2 + sin(t * freq) * 100;
                this.y = height / 2 + cos(t * freq * 0.7) * 100;
                
                // Scale animation
                this.scale = 0.5 + sin(t * freq * 0.5) * 0.3;
                
                // Rotation
                this.rotation = t * freq * 0.3;
                
                // Opacity follows a different rhythm
                this.opacity = 0.3 + sin(t * freq * 2) * 0.2;
            }

            display() {
                push();
                translate(this.x, this.y);
                rotate(this.rotation);
                
                let col = hexToRgb(params.colorPalette[this.index % 3]);
                fill(col.r, col.g, col.b, this.opacity * 255);
                stroke(col.r, col.g, col.b, this.opacity * 200);
                strokeWeight(2);

                let s = this.size * this.scale;

                if (this.type === 'circle') {
                    circle(0, 0, s);
                } else if (this.type === 'rect') {
                    rect(-s/2, -s/2, s, s);
                } else {
                    // Polygon
                    beginShape();
                    for (let i = 0; i < 6; i++) {
                        let angle = TWO_PI / 6 * i;
                        let vx = cos(angle) * s;
                        let vy = sin(angle) * s;
                        vertex(vx, vy);
                    }
                    endShape(CLOSE);
                }

                pop();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UTILITY FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : {r: 217, g: 119, b: 87};
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            if (paramName === 'particleCount') {
                params.particleCount = parseInt(value);
                document.getElementById('particleCount-value').textContent = value;
                initializeSystem();
            } else if (paramName === 'layerComplexity') {
                params.layerComplexity = parseInt(value);
                document.getElementById('layerComplexity-value').textContent = value;
                initializeSystem();
            } else if (paramName === 'animSpeed') {
                params.animSpeed = parseFloat(value);
                document.getElementById('animSpeed-value').textContent = parseFloat(value).toFixed(1);
            } else if (paramName === 'noiseInfluence') {
                params.noiseInfluence = parseFloat(value);
                document.getElementById('noiseInfluence-value').textContent = parseFloat(value).toFixed(2);
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function jumpToSeed() {
            let input = document.getElementById('seed-jump');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                updateSeedDisplay();
                initializeSystem();
                input.value = '';
            }
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};
            
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('layerComplexity').value = params.layerComplexity;
            document.getElementById('layerComplexity-value').textContent = params.layerComplexity;
            document.getElementById('animSpeed').value = params.animSpeed;
            document.getElementById('animSpeed-value').textContent = params.animSpeed.toFixed(1);
            document.getElementById('noiseInfluence').value = params.noiseInfluence;
            document.getElementById('noiseInfluence-value').textContent = params.noiseInfluence.toFixed(2);
            
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            
            updateSeedDisplay();
            initializeSystem();
        }

        function downloadFrame() {
            saveCanvas('manifest-entropy-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
